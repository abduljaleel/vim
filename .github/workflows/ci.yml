name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  dco:
    name: DCO Check
    runs-on: ubuntu-latest
    # Shell-based DCO check rather than a third-party action so there is
    # no additional supply-chain dependency beyond GitHub-maintained code.
    # For richer UX install the DCO GitHub App from the marketplace.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify every commit is signed off
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          head="${{ github.event.pull_request.head.sha || github.sha }}"
          # For push-to-default-branch events, "before" on the first push is all-zero;
          # just check the tip commit in that case.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            range="$head -1"
          else
            range="$base..$head"
          fi
          missing=0
          for sha in $(git rev-list $range); do
            if ! git log -1 --format=%B "$sha" | grep -qE "^Signed-off-by: "; then
              echo "::error::Commit $sha is missing a 'Signed-off-by:' trailer (use 'git commit -s')"
              missing=1
            fi
          done
          exit $missing

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run OSV Scanner
        # Install the CLI directly rather than depend on an action wrapper
        # whose tag surface has been unstable historically.
        run: |
          go install github.com/google/osv-scanner/cmd/osv-scanner@latest
          "$(go env GOPATH)/bin/osv-scanner" scan source --lockfile=go.mod
        continue-on-error: true

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
